<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Lenskart Pali</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .stat-card { transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-5px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

<nav class="bg-[#0f172a] text-white p-4 border-b-4 border-blue-600 sticky top-0 z-50 shadow-2xl">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg"><i class="fa-solid fa-chart-line"></i></div>
            <span class="font-black text-sm tracking-tighter uppercase">Data Command Center</span>
        </div>
        <div class="flex gap-3">
            <a href="index.html" class="text-[10px] font-black uppercase opacity-60 hover:opacity-100 transition px-3 py-2">Store Panel</a>
            <button onclick="loadData()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-xl font-black text-[10px] uppercase shadow-lg transition-all">Refresh Data</button>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto p-6 space-y-8">
    
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <div class="stat-card bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Orders</p>
            <h3 id="statTotal" class="text-4xl font-black mt-2">0</h3>
        </div>
        <div class="stat-card bg-white p-6 rounded-[2rem] shadow-sm border-l-4 border-l-blue-500 border border-slate-200">
            <p class="text-[10px] font-black text-blue-500 uppercase tracking-widest">New Entries</p>
            <h3 id="statNew" class="text-4xl font-black mt-2 text-blue-600">0</h3>
        </div>
        <div class="stat-card bg-white p-6 rounded-[2rem] shadow-sm border-l-4 border-l-amber-500 border border-slate-200">
            <p class="text-[10px] font-black text-amber-500 uppercase tracking-widest">In Transit</p>
            <h3 id="statTransit" class="text-4xl font-black mt-2 text-amber-600">0</h3>
        </div>
        <div class="stat-card bg-white p-6 rounded-[2rem] shadow-sm border-l-4 border-l-green-500 border border-slate-200">
            <p class="text-[10px] font-black text-green-500 uppercase tracking-widest">Delivered</p>
            <h3 id="statDone" class="text-4xl font-black mt-2 text-green-600">0</h3>
        </div>
    </div>

    <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden">
        <div class="p-6 border-b flex flex-col md:flex-row justify-between items-center gap-4 bg-slate-50/50">
            <h2 class="text-xs font-black uppercase text-slate-500 tracking-widest">Order Management</h2>
            <div class="relative w-full md:w-72">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input type="text" id="tableSearch" placeholder="Search customer or ID..." oninput="filterTable(this.value)" class="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm font-bold outline-none focus:border-blue-500 shadow-sm transition">
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-900 text-white text-[10px] font-black uppercase tracking-wider">
                        <th class="p-5">Date</th>
                        <th class="p-5">Order ID</th>
                        <th class="p-5">Customer</th>
                        <th class="p-5">Location</th>
                        <th class="p-5">Status</th>
                        <th class="p-5 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="masterTable" class="divide-y divide-slate-100 text-sm">
                    <tr><td colspan="6" class="p-20 text-center text-slate-400 font-bold uppercase text-[10px] tracking-widest">Initialising Database...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script>
    // --- 🟢 SUPABASE CONFIGURATION (Using 'sbClient' to avoid library conflicts) ---
    const SB_URL = "https://ptxborpikjyrhyildtdz.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0eGJvcnBpa2p5cmh5aWxkdGR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MDQwMzMsImV4cCI6MjA5NDA4MDAzM30.L779atn06WDs90jJozlC3PBGwAn3u7XzUn2Ka6S0PRY";
    
    const sbClient = supabase.createClient(SB_URL, SB_KEY);
    let allOrders = [];

    // --- 🔵 LOAD DATA ---
    async function loadData() {
        const tableBody = document.getElementById('masterTable');
        
        try {
            const { data, error } = await sbClient.from('orders').select('*').order('created_at', { ascending: false });
            
            if (error) throw error;
            allOrders = data || [];
            renderTable(allOrders);
            updateStats(allOrders);

        } catch (err) {
            console.error("Database error:", err.message);
            tableBody.innerHTML = `<tr><td colspan="6" class="p-20 text-center text-red-500 font-black uppercase text-[10px]">Error: ${err.message}</td></tr>`;
        }
    }

    // --- 🟡 RENDER TABLE ---
    function renderTable(data) {
        const tableBody = document.getElementById('masterTable');
        
        if (data.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="6" class="p-20 text-center text-slate-400 font-bold uppercase text-[10px]">No Records Found</td></tr>`;
            return;
        }

        tableBody.innerHTML = data.map(o => `
            <tr class="hover:bg-blue-50/30 transition group">
                <td class="p-5 text-slate-500 font-bold text-xs">${new Date(o.created_at).toLocaleDateString('en-IN')}</td>
                <td class="p-5 font-black text-blue-600 text-xs">${o.order_id}</td>
                <td class="p-5">
                    <p class="font-black text-slate-800 uppercase text-xs">${o.customer_name}</p>
                    <p class="text-[10px] text-slate-400 font-bold">${o.mobile}</p>
                </td>
                <td class="p-5">
                    <p class="font-bold text-slate-600 text-[10px] uppercase">${o.city || 'N/A'}</p>
                    <p class="text-[9px] text-slate-400 font-medium">${o.post_office || ''}</p>
                </td>
                <td class="p-5">
                    <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${getStatusStyle(o.status)}">
                        ${o.status || 'Created'}
                    </span>
                </td>
                <td class="p-5 text-right">
                    <div class="flex justify-end gap-2 opacity-0 group-hover:opacity-100 transition">
                        <button onclick="window.location.href='index.html'" class="bg-slate-900 text-white p-2 rounded-lg text-[10px] hover:bg-blue-600 transition" title="Reprint">
                            <i class="fa-solid fa-print"></i>
                        </button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    // --- ⚪ HELPERS ---
    function getStatusStyle(s) {
        if (s === 'Dispatch') return 'bg-amber-100 text-amber-700 border border-amber-200';
        if (s === 'Delivered') return 'bg-green-100 text-green-700 border border-green-200';
        return 'bg-blue-100 text-blue-700 border border-blue-200';
    }

    function updateStats(data) {
        document.getElementById('statTotal').innerText = data.length;
        document.getElementById('statNew').innerText = data.filter(o => o.status === 'Created' || !o.status).length;
        document.getElementById('statTransit').innerText = data.filter(o => o.status === 'Dispatch').length;
        document.getElementById('statDone').innerText = data.filter(o => o.status === 'Delivered').length;
    }

    function filterTable(val) {
        const query = val.toLowerCase();
        const filtered = allOrders.filter(o => 
            o.order_id.toLowerCase().includes(query) || 
            o.customer_name.toLowerCase().includes(query) ||
            o.mobile.includes(query)
        );
        renderTable(filtered);
    }

    // Initial Load
    window.addEventListener('load', loadData);
</script>
</body>
</html>
