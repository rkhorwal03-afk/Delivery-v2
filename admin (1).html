<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Lenskart Pali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 text-slate-900 font-sans">

<nav class="bg-slate-900 text-white p-4 border-b-4 border-blue-600 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <span class="font-black text-lg tracking-tighter">DATA COMMAND CENTER</span>
        <button onclick="loadData()" class="bg-blue-600 px-4 py-2 rounded font-black text-[10px] uppercase">Refresh DB</button>
    </div>
</nav>

<div class="max-w-6xl mx-auto p-6 space-y-6">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="bg-white p-6 rounded-3xl shadow-sm border">
            <p class="text-[9px] font-black text-slate-400 uppercase">Total Orders</p>
            <h3 id="statTotal" class="text-3xl font-black">0</h3>
        </div>
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-blue-100">
            <p class="text-[9px] font-black text-blue-500 uppercase">New Entries</p>
            <h3 id="statNew" class="text-3xl font-black text-blue-600">0</h3>
        </div>
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-green-100">
            <p class="text-[9px] font-black text-green-500 uppercase">In Transit</p>
            <h3 id="statTransit" class="text-3xl font-black text-green-600">0</h3>
        </div>
        <div class="bg-white p-6 rounded-3xl shadow-sm border">
            <p class="text-[9px] font-black text-slate-400 uppercase">Delivered</p>
            <h3 id="statDone" class="text-3xl font-black">0</h3>
        </div>
    </div>

    <div class="bg-white rounded-[2rem] shadow-xl border overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-slate-900 text-white uppercase text-[10px] font-bold">
                <tr>
                    <th class="p-5">Order ID</th>
                    <th class="p-5">Customer</th>
                    <th class="p-5">Area</th>
                    <th class="p-5">Status</th>
                    <th class="p-5 text-right">Reprint</th>
                </tr>
            </thead>
            <tbody id="masterTable" class="divide-y divide-slate-100 text-sm"></tbody>
        </table>
    </div>
</div>

<script>
    const SB_URL = "https://hdumauwzcpzykhbjpotp.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhkdW1hdXd6Y3B6eWtoYmpwb3RwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0OTgyMTcsImV4cCI6MjA5NDA3NDIxN30.t4Vr_3GrLJSAuKpt4JAZ2ii7iSmFxkTcCyoqntGWZdg";
    const supabase = supabase.createClient(SB_URL, SB_KEY);

    async function loadData() {
        const { data } = await supabase.from('orders').select('*').order('created_at', { ascending: false });
        if(!data) return;

        document.getElementById('statTotal').innerText = data.length;
        document.getElementById('statNew').innerText = data.filter(o => o.status === 'Created').length;
        document.getElementById('statTransit').innerText = data.filter(o => o.status === 'Dispatch').length;
        document.getElementById('statDone').innerText = data.filter(o => o.status === 'Delivered').length;

        const table = document.getElementById('masterTable');
        table.innerHTML = data.map(o => `
            <tr class="hover:bg-slate-50">
                <td class="p-5 font-black text-blue-600">${o.order_id}</td>
                <td class="p-5 font-bold uppercase">${o.customer_name}</td>
                <td class="p-5 text-slate-500 font-medium">${o.city}</td>
                <td class="p-5">
                    <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${o.status === 'Dispatch' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}">
                        ${o.status}
                    </span>
                </td>
                <td class="p-5 text-right"><button onclick="printFromDB('${o.order_id}')" class="text-slate-900"><i class="fa-solid fa-print"></i></button></td>
            </tr>
        `).join('');
    }

    async function printFromDB(id) {
        const { data } = await supabase.from('orders').select('*').eq('order_id', id).single();
        if(data) {
            // Logic to trigger the printArea (sharing code from index.html)
            // Ideally, host a shared print logic or open index.html?print=ID
            alert("Open Reprint tab in Store Panel for: " + id);
        }
    }
    loadData();
</script>
</body>
</html>
