<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Panel | Lenskart Pali</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        #printArea { display: none; }
        @media print {
            body > *:not(#printArea) { display: none !important; }
            #printArea {
                display: block !important; visibility: visible !important;
                position: absolute; left: 0; top: 0; width: 54mm;
                padding: 1mm; font-family: sans-serif !important;
                font-size: 11px !important; line-height: 1.2;
            }
            #qrcode img { display: block !important; margin: 0 auto; width: 90px; height: 90px; }
            @page { margin: 0; size: 58mm auto; }
        }
        .view-section { display: none; }
        .view-section.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

<nav class="bg-[#0f172a] text-white sticky top-0 z-[100] border-b-2 border-blue-600 shadow-xl">
    <div class="max-w-xl mx-auto px-4 flex justify-between items-center h-14">
        <span class="font-black uppercase tracking-tighter text-sm text-blue-400">Lenskart Pali</span>
        <div class="flex gap-2">
            <button onclick="showView('entry')" id="nav-entry" class="bg-blue-600 px-3 py-1.5 rounded font-black text-[10px] uppercase">New Entry</button>
            <button onclick="showView('history')" id="nav-history" class="opacity-50 px-3 py-1.5 rounded font-black text-[10px] uppercase">Reprint</button>
        </div>
    </div>
</nav>

<main class="max-w-xl mx-auto p-4 space-y-6 mt-4">
    <section id="view-entry" class="view-section active">
        <div class="bg-white rounded-[2.5rem] shadow-2xl border border-slate-200 p-8">
            <h2 class="text-[10px] font-black uppercase text-slate-400 mb-6 tracking-widest text-center">Customer Delivery Details</h2>
            
            <form id="orderForm" class="space-y-4">
                <input type="text" id="orderId" placeholder="ORDER ID" required class="w-full border-2 p-4 rounded-2xl font-black uppercase text-sm outline-none focus:border-blue-600">
                <input type="text" id="custName" placeholder="CUSTOMER FULL NAME" required class="w-full border-2 p-4 rounded-2xl font-bold uppercase text-sm outline-none">
                <textarea id="address" placeholder="ADDRESS" required rows="2" class="w-full border-2 p-4 rounded-2xl font-bold text-sm outline-none"></textarea>
                
                <div class="grid grid-cols-2 gap-3">
                    <input type="tel" id="mobile" placeholder="MOBILE" required maxlength="10" class="w-full border-2 p-4 rounded-2xl font-bold text-sm outline-none">
                    <input type="tel" id="altMobile" placeholder="ALT NO" maxlength="10" class="w-full border-2 p-4 rounded-2xl font-bold text-sm outline-none">
                </div>

                <div class="bg-blue-50 p-6 rounded-[2rem] space-y-4 border border-blue-100">
                    <input type="number" id="pincode" placeholder="PINCODE" oninput="autoFetch(this.value)" required class="w-full border-2 border-blue-200 p-4 rounded-2xl font-black text-center text-blue-600 text-lg outline-none">
                    
                    <select id="postOffice" class="w-full border-2 border-blue-100 p-4 rounded-2xl font-bold bg-white text-sm outline-none">
                        <option value="">— SELECT AREA —</option>
                    </select>

                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="city" placeholder="CITY" readonly class="w-full bg-white p-4 rounded-2xl font-bold text-slate-500 uppercase text-xs">
                        <input type="text" id="state" placeholder="STATE" readonly class="w-full bg-white p-4 rounded-2xl font-bold text-slate-500 uppercase text-xs">
                    </div>
                </div>

                <input type="text" id="landmark" placeholder="LANDMARK" class="w-full border-2 p-4 rounded-2xl font-bold text-sm outline-none uppercase">

                <button type="submit" id="saveBtn" class="w-full bg-[#0f172a] text-white font-black py-5 rounded-2xl uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-all">Save Order →</button>
            </form>
        </div>
    </section>

    <section id="view-history" class="view-section">
        <div id="historyList" class="bg-white rounded-[2rem] shadow-xl border border-slate-200 p-6 divide-y"></div>
    </section>
</main>

<div id="printArea">
    <div style="text-align: center; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 8px;">
        <p style="font-weight: 900; font-size: 14pt;">LENSKART PALI</p>
    </div>
    <div style="font-size: 10pt; line-height: 1.3;">
        <p><b>Order:</b> <span id="prId"></span></p>
        <p><b>Name:</b> <span id="prName"></span></p>
        <p><b>Address:</b> <span id="prAddr"></span></p>
        <p><b>Contact:</b> <span id="prMob"></span></p>
    </div>
    <div id="qrcode" style="display: flex; justify-content: center; margin-top: 10px;"></div>
</div>

<script>
    // --- 🟢 CONFIGURATION (Renamed to sbClient to avoid declaration errors) ---
    const SB_URL = "https://ptxborpikjyrhyildtdz.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0eGJvcnBpa2p5cmh5aWxkdGR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MDQwMzMsImV4cCI6MjA5NDA4MDAzM30.L779atn06WDs90jJozlC3PBGwAn3u7XzUn2Ka6S0PRY";
    
    // Use 'sbClient' instead of 'supabase' to avoid conflict with the library namespace
    const sbClient = supabase.createClient(SB_URL, SB_KEY);

    let cachedOrders = [];

    function showView(v) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.getElementById('view-' + v).classList.add('active');
        if(v === 'history') fetchHistory();
    }

    // --- 🔵 PINCODE LOGIC (Now correctly defined) ---
    async function autoFetch(pin) {
        if (pin.length !== 6) return;
        try {
            const res = await fetch(`https://api.postalpincode.in/pincode/${pin}`);
            const data = await res.json();
            if (data[0].Status === "Success") {
                const po = data[0].PostOffice;
                document.getElementById('postOffice').innerHTML = po.map(p => `<option value="${p.Name}">${p.Name}</option>`).join('');
                document.getElementById('city').value = po[0].District;
                document.getElementById('state').value = po[0].State;
            }
        } catch (e) { console.log("API Error"); }
    }

    // --- 🟡 SAVE LOGIC ---
    document.getElementById('orderForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('saveBtn');
        btn.innerText = "SAVING...";
        
        const payload = {
            order_id: document.getElementById('orderId').value.toUpperCase().trim(),
            customer_name: document.getElementById('custName').value.toUpperCase().trim(),
            address: document.getElementById('address').value.trim(),
            mobile: document.getElementById('mobile').value.trim(),
            pincode: document.getElementById('pincode').value.trim(),
            city: document.getElementById('city').value.trim(),
            state: document.getElementById('state').value.trim(),
            status: "Created"
        };

        const { error } = await sbClient.from('orders').insert([payload]);
        
        if(error) {
            alert("Error: " + error.message);
        } else {
            alert("Saved!");
            printSlip(payload);
            document.getElementById('orderForm').reset();
        }
        btn.innerText = "Save Order →";
    };

    async function fetchHistory() {
        const { data } = await sbClient.from('orders').select('*').order('created_at', { ascending: false });
        cachedOrders = data || [];
        document.getElementById('historyList').innerHTML = cachedOrders.map(o => `
            <div class="p-4 flex justify-between items-center">
                <span class="font-bold text-xs uppercase">${o.customer_name}</span>
                <button onclick="printSlipById('${o.order_id}')" class="bg-slate-900 text-white px-3 py-1 rounded text-[10px]">PRINT</button>
            </div>
        `).join('');
    }

    function printSlipById(id) {
        const o = cachedOrders.find(item => item.order_id === id);
        if(o) printSlip(o);
    }

    function printSlip(d) {
        document.getElementById('prId').innerText = d.order_id;
        document.getElementById('prName').innerText = d.customer_name;
        document.getElementById('prAddr').innerText = d.address;
        document.getElementById('prMob').innerText = d.mobile;
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: d.order_id, width: 90, height: 90 });
        setTimeout(() => window.print(), 500);
    }
</script>
</body>
</html>
