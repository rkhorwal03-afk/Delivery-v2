<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Panel | Lenskart Pali</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* ── 58mm Thermal Print Formatting ── */
        #printArea { display: none; }
        @media print {
            body > *:not(#printArea) { display: none !important; }
            #printArea {
                display: block !important; visibility: visible !important;
                position: absolute; left: 0; top: 0; width: 54mm;
                padding: 1mm; font-family: 'Courier New', Courier, monospace !important;
                font-size: 11px !important; color: #000; background: #fff; line-height: 1.2 !important;
            }
            #qrcode img { display: block !important; margin: 0 auto; width: 90px; height: 90px; }
            @page { margin: 0; size: 58mm auto; }
        }
        
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.2s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

<nav class="bg-[#0f172a] text-white sticky top-0 z-[100] border-b-2 border-blue-600 shadow-xl">
    <div class="max-w-xl mx-auto px-4 flex justify-between items-center h-14">
        <span class="font-black uppercase tracking-tighter text-sm text-blue-400">Lenskart Pali Store</span>
        <div class="flex gap-2">
            <button onclick="showView('entry')" id="nav-entry" class="bg-blue-600 px-3 py-1.5 rounded font-black text-[10px] uppercase">New Entry</button>
            <button onclick="showView('history')" id="nav-history" class="opacity-50 px-3 py-1.5 rounded font-black text-[10px] uppercase">Reprint</button>
        </div>
    </div>
</nav>

<main class="max-w-xl mx-auto p-4 space-y-6 mt-4">

    <section id="view-entry" class="view-section active">
        <div class="bg-white rounded-[2.5rem] shadow-2xl border border-slate-200 p-8">
            <h2 class="text-[10px] font-black uppercase text-slate-400 mb-6 tracking-widest text-center">Customer Delivery Details</h2>
            
            <form id="orderForm" class="space-y-4">
                <input type="text" id="orderId" placeholder="ORDER ID (e.g. NEX-123)" required class="w-full border-2 p-4 rounded-2xl font-black uppercase text-sm outline-none focus:border-blue-600">
                <input type="text" id="custName" placeholder="CUSTOMER FULL NAME" required class="w-full border-2 p-4 rounded-2xl font-bold uppercase text-sm outline-none focus:border-blue-600">
                <textarea id="address" placeholder="SHIPPING STREET ADDRESS" required rows="2" class="w-full border-2 p-4 rounded-2xl font-bold text-sm outline-none focus:border-blue-600"></textarea>
                
                <div class="grid grid-cols-2 gap-3">
                    <input type="tel" id="mobile" placeholder="CONTACT NO" required maxlength="10" class="w-full border-2 p-4 rounded-2xl font-bold text-sm outline-none focus:border-blue-600">
                    <input type="tel" id="altMobile" placeholder="ALT NO" maxlength="10" class="w-full border-2 p-4 rounded-2xl font-bold text-sm outline-none focus:border-blue-600">
                </div>

                <div class="bg-blue-50 p-6 rounded-[2rem] space-y-4 border border-blue-100">
                    <div class="relative">
                        <input type="number" id="pincode" placeholder="PINCODE" oninput="autoFetch(this.value)" required class="w-full border-2 border-blue-200 p-4 rounded-2xl font-black text-center text-blue-600 text-lg focus:border-blue-600 outline-none">
                        <span id="pinLoader" class="hidden absolute right-4 top-1/2 -translate-y-1/2 text-[9px] font-black text-blue-400 animate-pulse">FETCHING...</span>
                    </div>

                    <select id="postOffice" class="w-full border-2 border-blue-100 p-4 rounded-2xl font-bold bg-white text-sm outline-none focus:border-blue-600">
                        <option value="">— SELECT AREA / PO —</option>
                    </select>

                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="city" placeholder="CITY" readonly class="w-full bg-white border-0 p-4 rounded-2xl font-bold text-slate-500 uppercase text-xs">
                        <input type="text" id="state" placeholder="STATE" readonly class="w-full bg-white border-0 p-4 rounded-2xl font-bold text-slate-500 uppercase text-xs">
                    </div>
                </div>

                <input type="text" id="landmark" placeholder="LANDMARK (OPTIONAL)" class="w-full border-2 p-4 rounded-2xl font-bold text-sm outline-none uppercase focus:border-blue-600">

                <button type="submit" id="saveBtn" class="w-full bg-[#0f172a] text-white font-black py-5 rounded-2xl uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-all">Review & Save Order →</button>
            </form>
        </div>
    </section>

    <section id="view-history" class="view-section">
        <div class="bg-white rounded-[2rem] shadow-xl border border-slate-200 p-6">
            <div class="flex gap-2 mb-6">
                <input type="text" id="searchId" placeholder="SEARCH ORDER ID..." class="flex-1 bg-slate-100 p-4 rounded-2xl outline-none font-black text-blue-600 uppercase text-sm">
                <button onclick="searchPrint()" class="bg-blue-600 text-white px-6 rounded-2xl"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
            <div id="historyList" class="divide-y divide-slate-100 max-h-[60vh] overflow-y-auto"></div>
        </div>
    </section>

</main>

<div id="printArea">
    <div style="text-align: center; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 8px;">
        <p style="margin: 0; font-size: 11pt; font-weight: 900;">LENSKART PALI</p>
        <h1 style="margin: 0; font-size: 14pt; font-weight: 900; text-decoration: underline;">DELIVERY SLIP</h1>
    </div>

    <div style="font-size: 10pt; line-height: 1.3; margin-bottom: 8px;">
        <p style="margin: 0; font-weight: 900; text-decoration: underline;">To,</p>
        <p style="margin: 3px 0 0 0;"><b>Name:</b> <span id="prName" style="text-transform: uppercase; font-weight: 900;"></span></p>
        <p style="margin: 2px 0 0 0;"><b>Address:</b> <span id="prAddr"></span></p>
        <p style="margin: 2px 0 0 0;"><b>Location:</b> <span id="prCity"></span>, <span id="prState"></span></p>
        <p style="margin: 2px 0 0 0;"><b>Pin:</b> <span id="prPin"></span></p>
        <p style="margin: 2px 0 0 0;"><b>Landmark:</b> <span id="prLand"></span></p>
        <p style="margin: 4px 0 0 0;"><b>Contact:</b> <span id="prMob" style="font-weight: 900;"></span></p>
        <p style="margin: 2px 0 0 0;"><b>Alt No:</b> <span id="prAlt"></span></p>
    </div>

    <div style="border-top: 1.5px solid #000; padding-top: 5px; font-size: 9pt; line-height: 1.2; margin-bottom: 8px;">
        <p style="margin: 0; font-weight: 900; text-decoration: underline;">From,</p>
        <p style="margin: 2px 0 0 0; font-weight: 900;">LENSKART PALI</p>
        <p style="margin: 0;">Shop No 3 & 4, Ambedkar Circle, Pali, Raj. 306401</p>
        <p style="margin: 1px 0 0 0;"><b>Ph:</b> 8290776551</p>
    </div>

    <div style="text-align: center; border-top: 1px dashed #000; padding-top: 5px;">
        <div id="qrcode" style="display: flex; justify-content: center; margin-bottom: 5px;"></div>
        <p style="margin: 0; font-weight: 900; font-size: 12pt;">ID: <span id="prId"></span></p>
    </div>
</div>

<script>
    // --- 🟢 SUPABASE CONFIG ---
    const SB_URL = "https://ptxborpikjyrhyildtdz.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0eGJvcnBpa2p5cmh5aWxkdGR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MDQwMzMsImV4cCI6MjA5NDA4MDAzM30.L779atn06WDs90jJozlC3PBGwAn3u7XzUn2Ka6S0PRY";
    const supabase = supabase.createClient(SB_URL, SB_KEY);

    let cachedOrders = [];
    let pinDebounce = null;

    function showView(v) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.getElementById('view-' + v).classList.add('active');
        document.getElementById('nav-entry').classList.toggle('opacity-50', v !== 'entry');
        document.getElementById('nav-history').classList.toggle('opacity-50', v !== 'history');
        if(v === 'history') fetchHistory();
    }

    // --- 🔵 FIXED PINCODE LOGIC ---
    async function autoFetch(pin) {
        const loader = document.getElementById('pinLoader');
        const poSelect = document.getElementById('postOffice');
        const cityInput = document.getElementById('city');
        const stateInput = document.getElementById('state');

        if (pin.length !== 6) return;

        loader.classList.remove('hidden');
        clearTimeout(pinDebounce);

        pinDebounce = setTimeout(async () => {
            try {
                const res = await fetch(`https://api.postalpincode.in/pincode/${pin}`);
                const data = await res.json();
                if (data[0].Status === "Success") {
                    const pos = data[0].PostOffice;
                    poSelect.innerHTML = pos.map(p => `<option value="${p.Name}">${p.Name}</option>`).join('');
                    cityInput.value = pos[0].District;
                    stateInput.value = pos[0].State;
                } else {
                    alert("Invalid Pincode");
                    cityInput.value = ""; stateInput.value = "";
                }
            } catch (err) { console.error("API DOWN"); }
            loader.classList.add('hidden');
        }, 400);
    }

    // --- 🟡 SAVE DATA ---
    document.getElementById('orderForm').onsubmit = async (e) => {
        e.preventDefault();
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.innerText = "SAVING TO CLOUD...";
        saveBtn.disabled = true;

        const payload = {
            order_id: document.getElementById('orderId').value.toUpperCase().trim(),
            customer_name: document.getElementById('custName').value.toUpperCase().trim(),
            address: document.getElementById('address').value.trim(),
            mobile: document.getElementById('mobile').value.trim(),
            alt_mobile: document.getElementById('altMobile').value.trim() || "N/A",
            pincode: document.getElementById('pincode').value.trim(),
            post_office: document.getElementById('postOffice').value,
            city: document.getElementById('city').value.trim(),
            state: document.getElementById('state').value.trim(),
            landmark: document.getElementById('landmark').value.trim() || "N/A",
            status: "Created"
        };

        const { error } = await supabase.from('orders').insert([payload]);
        
        if(error) {
            alert("Error: " + error.message);
        } else {
            generateSlip(payload);
            document.getElementById('orderForm').reset();
            alert("Success! Printing Slip...");
        }
        saveBtn.innerText = "Review & Save Order →";
        saveBtn.disabled = false;
    };

    // --- ⚪ REPRINT ---
    async function fetchHistory() {
        const { data } = await supabase.from('orders').select('*').order('created_at', { ascending: false }).limit(20);
        cachedOrders = data || [];
        document.getElementById('historyList').innerHTML = cachedOrders.length ? cachedOrders.map(o => `
            <div class="p-4 flex justify-between items-center border-b">
                <div><p class="font-black text-blue-600 text-xs">${o.order_id}</p><p class="text-[10px] font-bold uppercase">${o.customer_name}</p></div>
                <button onclick="generateSlipById('${o.order_id}')" class="bg-slate-900 text-white p-2.5 rounded-xl"><i class="fa-solid fa-print"></i></button>
            </div>
        `).join('') : '<p class="text-center p-10 text-slate-400 font-bold text-xs">NO ORDERS FOUND</p>';
    }

    function generateSlipById(id) {
        const o = cachedOrders.find(item => item.order_id === id);
        if(o) generateSlip(o);
    }

    async function searchPrint() {
        const id = document.getElementById('searchId').value.toUpperCase().trim();
        const { data } = await supabase.from('orders').select('*').eq('order_id', id).single();
        if(data) generateSlip(data); else alert("ID Not Found");
    }

    function generateSlip(d) {
        document.getElementById('prId').innerText = d.order_id;
        document.getElementById('prName').innerText = d.customer_name;
        document.getElementById('prAddr').innerText = d.address;
        document.getElementById('prCity').innerText = d.city;
        document.getElementById('prState').innerText = d.state;
        document.getElementById('prPin').innerText = d.pincode;
        document.getElementById('prLand').innerText = d.landmark;
        document.getElementById('prMob').innerText = d.mobile;
        document.getElementById('prAlt').innerText = d.alt_mobile || "N/A";
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: d.order_id, width: 100, height: 100 });
        setTimeout(() => window.print(), 800);
    }
</script>
</body>
</html>
